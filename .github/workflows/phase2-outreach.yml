name: phase2-outreach

on:
  schedule:
    - cron: "17 10 * * *"    # daily 10:17 UTC — Phase 2 outreach (primary)
    # Redundant same-day catch-up firing, 5h later — a reliability safety net, not a
    # second daily budget. GitHub `schedule` events are best-effort (fire hours late or
    # drop entirely) and hosted runners occasionally reject a job outright ("not
    # acquired by Runner", run #59, 2026-07-09). If the 10:17 firing dropped, drifted,
    # or died, this one catches up; if 10:17 already cleared the queue, this one is a
    # ~2-3 min no-op (reply poll + syncs only, nothing due to send). Safe because the
    # pipeline is idempotent end-to-end: Touch 1 only selects status=new (flipped by a
    # successful send), Touch 2+ requires last_contacted older than
    # FOLLOWUP_DELAY_DAYS, and every send is deduped on (email, stage_number) in
    # outreach_log — a second firing cannot re-send what the first already recorded.
    # DAILY_EMAIL_CAP is likewise a shared per-day ceiling, not per-firing: main.py
    # seeds sends_today from outreach_log rows already logged today before either
    # loop runs (sheets_client.get_outreach_log_cache_and_today_count +
    # smtp_client.seed_sends_today), so two firings can't add up to 2x the cap.
    # 5h gap is intentionally > the 180-min run time budget below, so the two firings
    # can never overlap — DO NOT shrink this gap without also shrinking the budget.
    - cron: "17 15 * * *"    # daily 15:17 UTC — Phase 2 outreach (catch-up)
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  outreach:
    runs-on: ubuntu-latest
    # Hard-kill ceiling, driven by the PHASE2_TIMEOUT_MINUTES repo var (unset → 180).
    # The Python engine reads the SAME var and stops sending ~15 min before this
    # (config.RUN_TIME_BUDGET_SECONDS), so runs end gracefully — summary email,
    # cleanup, and Brevo post-sync always execute; unsent leads defer to tomorrow.
    # The engine also self-caps sends/run to budget ÷ MAX_SEND_GAP_SECONDS
    # (≈82 at 180 min / 120 s gaps), so the warm-up ramp can never outgrow this
    # window. Real pacing math at 100–120 s/send (repo vars): 50/day ≈ 100 min,
    # 75/day ≈ 150 min, 100/day ≈ 200 min. To send more per day, raise the repo
    # var — but a single GitHub job caps at 6 h (~172 sends at 120 s); past that,
    # shrink the gap or split into multiple daily runs.
    # The var MUST be a plain integer (e.g. 60). Repo vars are strings, and GitHub
    # won't coerce them for timeout-minutes — fromJSON does the number conversion.
    timeout-minutes: ${{ fromJSON(vars.PHASE2_TIMEOUT_MINUTES || '180') }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create runtime directories
        run: mkdir -p logs active/leads

      - name: Run Phase 2 outreach
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          # IMAP creds for the in-run reply poll (main.py Step 2). Without these, reply_logger
          # falls back IMAP_PASS -> SMTP_PASS (the Brevo key) and auth-fails against Gmail,
          # so replies were never detected before follow-ups. Mirror of reply-logger.yml.
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_USER: ${{ secrets.GMAIL_SENDER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          FOLLOWUP_DELAY_DAYS: ${{ vars.FOLLOWUP_DELAY_DAYS }}
          MAX_FOLLOWUPS: ${{ vars.MAX_FOLLOWUPS }}
          CALENDLY_URL: ${{ vars.CALENDLY_URL }}
          SENDER_NAME: ${{ vars.SENDER_NAME }}
          WARMUP_START_DATE: ${{ vars.WARMUP_START_DATE }}
          MIN_SEND_GAP_SECONDS: ${{ vars.MIN_SEND_GAP_SECONDS }}
          MAX_SEND_GAP_SECONDS: ${{ vars.MAX_SEND_GAP_SECONDS }}
          # Hard ceiling on sends/run (default 300, empty-safe). Set a low value to
          # bound GitHub Actions minutes on a private-repo free plan — wall time is
          # ≈ (cap − 1) × avg send gap, and GitHub bills the pacing sleep. The
          # effective cap is min(this, warm-up rung, time-budget ceiling).
          DAILY_EMAIL_CAP: ${{ vars.DAILY_EMAIL_CAP }}
          # Same var as the job's timeout-minutes above — one knob drives both the
          # hard kill and the engine's soft stop (timeout − 15 min safety margin).
          # Empty injection is safe: config falls back to the same 180 default.
          PHASE2_TIMEOUT_MINUTES: ${{ vars.PHASE2_TIMEOUT_MINUTES }}
        run: python active/outreach/main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-logs-${{ github.run_id }}
          path: |
            logs/phase2_run.log
            logs/variant_log.jsonl
            active/leads/pipeline_errors.jsonl
            active/leads/template_metrics.tsv
          retention-days: 30
