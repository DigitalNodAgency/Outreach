name: phase2-outreach

on:
  schedule:
    - cron: "17 10 * * *"    # daily 10:17 UTC — Phase 2 outreach
  workflow_dispatch:         # manual trigger from Actions tab

jobs:
  outreach:
    runs-on: ubuntu-latest
    # Inter-send pacing is MIN_SEND_GAP_SECONDS..MAX_SEND_GAP_SECONDS (repo vars).
    # Default 100–120 s/send → budget ≈ daily_cap × 2 min.
    # 60 min covers warm-up caps (≤50/day) with headroom; raise if cap grows.
    # NOTE: single GitHub job caps at 6 h; split into smaller runs before scaling
    # past ~150/day at 120 s/send.
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create runtime directories
        run: mkdir -p logs active/leads

      - name: Run Phase 2 outreach
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          FOLLOWUP_DELAY_DAYS: ${{ vars.FOLLOWUP_DELAY_DAYS }}
          MAX_FOLLOWUPS: ${{ vars.MAX_FOLLOWUPS }}
          CALENDLY_URL: ${{ vars.CALENDLY_URL }}
          SENDER_NAME: ${{ vars.SENDER_NAME }}
          WARMUP_START_DATE: ${{ vars.WARMUP_START_DATE }}
          MIN_SEND_GAP_SECONDS: ${{ vars.MIN_SEND_GAP_SECONDS }}
          MAX_SEND_GAP_SECONDS: ${{ vars.MAX_SEND_GAP_SECONDS }}
        run: python active/outreach/main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-logs-${{ github.run_id }}
          path: |
            logs/phase2_run.log
            logs/variant_log.jsonl
            active/leads/pipeline_errors.jsonl
            active/leads/template_metrics.tsv
          retention-days: 30
