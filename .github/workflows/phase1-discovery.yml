name: phase1-discovery

on:
  schedule:
    - cron: "17 7 * * 1,4"   # Monday + Thursday 07:17 UTC (off-the-hour: GitHub drops/delays top-of-hour schedules)
  workflow_dispatch:        # manual trigger from Actions tab
    inputs:
      max_leads:
        description: "Override MAX_LEADS_PER_RUN for this run only"
        required: false
        default: ""

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Phase 1 discovery
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          PROSPEO_API_KEY: ${{ secrets.PROSPEO_API_KEY }}
          VIBE_PROSPECTING_API_KEY: ${{ secrets.VIBE_PROSPECTING_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          BV_API_KEY: ${{ secrets.BV_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          MAX_LEADS_PER_RUN: ${{ inputs.max_leads || vars.MAX_LEADS_PER_RUN }}
          ICP_PERSONA: ${{ vars.ICP_PERSONA }}
          ICP_COMPANY_SIZE: ${{ vars.ICP_COMPANY_SIZE }}
          ICP_INDUSTRIES: ${{ vars.ICP_INDUSTRIES }}
          ICP_REGIONS: ${{ vars.ICP_REGIONS }}
          ICP_DISQUALIFY: ${{ vars.ICP_DISQUALIFY }}
          # Industry filter (v17): self-labeled LinkedIn category replaces NAICS. Unset →
          # config default "marketing services,advertising services". Editing this repo
          # var re-scopes discovery and auto-resets the cursor (filter hash changes).
          ICP_LINKEDIN_CATEGORIES: ${{ vars.ICP_LINKEDIN_CATEGORIES }}
          # Credit-free pre-enrichment deny screen on company name. Unset → config default.
          ICP_DENY_KEYWORDS: ${{ vars.ICP_DENY_KEYWORDS }}
        run: python active/execution/phase1_runner.py

      - name: Upload Phase 1 logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase1-logs-${{ github.run_id }}
          path: |
            logs/phase1_run.log
            active/leads/pipeline_errors.jsonl
          retention-days: 30
