name: CTR / CTA Report

on:
  schedule:
    - cron: "0 14 * * 0"   # Sundays 14:00 UTC (≈ 7:30 PM IST)
  workflow_dispatch:
    inputs:
      days:
        description: "Report window in days (default 7)"
        default: "7"
        required: false

# Least privilege: these workflows only read the repo (all writes go to Google
# Sheets / SMTP APIs via secrets, never back to GitHub).
permissions:
  contents: read

jobs:
  ctr-report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run CTR report
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          CTR_REPORT_DAYS: ${{ github.event.inputs.days || '7' }}
        run: python active/execution/ctr_reporter.py
